# =============================================================================
# Docker Compose – xnapify (Development with HMR)
# =============================================================================
# Usage:
#   docker compose -f .docker/docker-compose.dev.yml up --build
#   docker compose -f .docker/docker-compose.dev.yml --profile postgres up --build
#
# Podman:
#   podman compose -f .docker/docker-compose.dev.yml up --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application (development mode)
  # ---------------------------------------------------------------------------
  xnapify:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.dev
    container_name: xnapify-dev
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '${XNAPIFY_PORT:-1337}:1337'
    environment:
      NODE_ENV: development
      XNAPIFY_HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: 'true'
      # Writable directories
      XNAPIFY_UPLOAD_DIR: /app/data/uploads
      XNAPIFY_NODERED_HOME: /app/data/node-red
      XNAPIFY_EXTENSION_DIR: /app/data/extensions
      XNAPIFY_CACHE_DIR: /app/data/caches
      XNAPIFY_FTS_DIR: /app/data/fts
      XNAPIFY_PG_DATA_DIR: /app/data/postgres
      XNAPIFY_MYSQL_DATA_DIR: /app/data/mysql
    volumes:
      # Bind-mount source code for live editing / HMR
      - ..:/app
      # Anonymous volume keeps container's Linux node_modules isolated
      # from host's macOS/Windows native bindings
      - /app/node_modules
      # Persistent data volume
      - xnapify_data:/app/data
    networks:
      - xnapify-net

  # ---------------------------------------------------------------------------
  # PostgreSQL (activate with: --profile postgres)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: xnapify-postgres
    profiles:
      - postgres
    restart: unless-stopped
    ports:
      - '${XNAPIFY_PG_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${XNAPIFY_PG_DB:-xnapify}
      POSTGRES_USER: ${XNAPIFY_PG_USER:-xnapify}
      POSTGRES_PASSWORD: ${XNAPIFY_PG_PASSWORD:-xnapify_secret}
    volumes:
      - xnapify_pg:/var/lib/postgresql/data
    networks:
      - xnapify-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${XNAPIFY_PG_USER:-xnapify}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MySQL (activate with: --profile mysql)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: xnapify-mysql
    profiles:
      - mysql
    restart: unless-stopped
    ports:
      - '${XNAPIFY_MYSQL_PORT:-3306}:3306'
    environment:
      MYSQL_DATABASE: ${XNAPIFY_MYSQL_DB:-xnapify}
      MYSQL_USER: ${XNAPIFY_MYSQL_USER:-xnapify}
      MYSQL_PASSWORD: ${XNAPIFY_MYSQL_PASSWORD:-xnapify_secret}
      MYSQL_ROOT_PASSWORD: ${XNAPIFY_MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - xnapify_mysql:/var/lib/mysql
    networks:
      - xnapify-net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Volumes
# =============================================================================
volumes:
  xnapify_data:
  xnapify_pg:
  xnapify_mysql:

# =============================================================================
# Networks
# =============================================================================
networks:
  xnapify-net:
    driver: bridge
