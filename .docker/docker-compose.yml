# =============================================================================
# Docker Compose – xnapify (xnapify)
# =============================================================================
# Usage:
#   docker compose -f .docker/docker-compose.yml up
#   docker compose -f .docker/docker-compose.yml --profile postgres up
#
# Override per-environment settings by creating docker-compose.override.yml
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  xnapify:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: xnapify-app
    restart: unless-stopped
    ports:
      - '${XNAPIFY_PORT:-1337}:1337'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      XNAPIFY_HOST: 0.0.0.0
      # Writable directories — all under /app/data (single persistent volume)
      XNAPIFY_UPLOAD_DIR: /app/data/uploads
      XNAPIFY_NODERED_HOME: /app/data/node-red
      XNAPIFY_EXTENSION_DIR: /app/data/extensions
      XNAPIFY_CACHE_DIR: /app/data/caches
      XNAPIFY_SQLITE_DATA_DIR: /app/data/sqlite
      XNAPIFY_PG_DATA_DIR: /app/data/postgres
      XNAPIFY_MYSQL_DATA_DIR: /app/data/mysql
    volumes:
      - xnapify_data:/app/data
    networks:
      - xnapify-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:1337/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # PostgreSQL (activate with: --profile postgres)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: xnapify-postgres
    profiles:
      - postgres
    restart: unless-stopped
    ports:
      - '${XNAPIFY_PG_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${XNAPIFY_PG_DB:-xnapify}
      POSTGRES_USER: ${XNAPIFY_PG_USER:-xnapify}
      POSTGRES_PASSWORD: ${XNAPIFY_PG_PASSWORD:-xnapify_secret}
    volumes:
      - xnapify_pg:/var/lib/postgresql/data
    networks:
      - xnapify-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${XNAPIFY_PG_USER:-xnapify}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MySQL (activate with: --profile mysql)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: xnapify-mysql
    profiles:
      - mysql
    restart: unless-stopped
    ports:
      - '${XNAPIFY_MYSQL_PORT:-3306}:3306'
    environment:
      MYSQL_DATABASE: ${XNAPIFY_MYSQL_DB:-xnapify}
      MYSQL_USER: ${XNAPIFY_MYSQL_USER:-xnapify}
      MYSQL_PASSWORD: ${XNAPIFY_MYSQL_PASSWORD:-xnapify_secret}
      MYSQL_ROOT_PASSWORD: ${XNAPIFY_MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - xnapify_mysql:/var/lib/mysql
    networks:
      - xnapify-net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Volumes
# =============================================================================
volumes:
  xnapify_data:
  xnapify_pg:
  xnapify_mysql:

# =============================================================================
# Networks
# =============================================================================
networks:
  xnapify-net:
    driver: bridge
